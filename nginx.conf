server {
  listen       ${PORT} default_server;
  listen       [::]:${PORT} default_server;
  server_name  _;

  root   /usr/share/nginx/html;
  index  original.html index.html;

  # セキュリティヘッダー
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # gzip で転送量削減
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml text/xml application/xml;
  gzip_min_length 1024;

  # エラーページ
  error_page 404 /404.html;
  error_page 500 502 503 504 /500.html;

  # 静的アセットにキャッシュ
  location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|ico)$ {
    expires 7d;
    add_header Cache-Control "public, must-revalidate" always;
  }

  # config.js は絶対キャッシュしない (ENV で毎起動変わる可能性)
  location = /js/config.js {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
