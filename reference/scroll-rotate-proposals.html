<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回転フィルター UI案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #fff; color: #222; padding: 40px 20px; }
  h1 { text-align: center; font-size: 2em; margin-bottom: 8px; }
  .desc { text-align: center; color: #888; margin-bottom: 40px; }
  .proposal { max-width: 1100px; margin: 0 auto 60px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
  .proposal-label { background: linear-gradient(135deg, #1b5e20, #4caf50); color: #fff; text-align: center; padding: 14px; font-size: 1.2em; font-weight: 900; }
  .proposal-body { padding: 36px; }
  .section-label { font-size: 0.95em; font-weight: 800; color: #222; margin-bottom: 16px; padding-left: 12px; border-left: 4px solid #4caf50; }

  /* ========================================= */
  /*  案A: 無限横スクロールベルト（左右逆回転）    */
  /* ========================================= */
  .ra-wrap { overflow: hidden; margin-bottom: 24px; position: relative; }
  .ra-wrap::before, .ra-wrap::after {
    content: ''; position: absolute; top: 0; bottom: 0; width: 60px; z-index: 2;
  }
  .ra-wrap::before { left: 0; background: linear-gradient(90deg, #fff, transparent); }
  .ra-wrap::after { right: 0; background: linear-gradient(90deg, transparent, #fff); }
  .ra-track {
    display: flex; gap: 12px; width: max-content;
    animation: ra-scroll 30s linear infinite;
  }
  .ra-track:hover { animation-play-state: paused; }
  .ra-rev { animation-direction: reverse; animation-duration: 35s; }
  .ra-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 12px; border: 1.5px solid #eee;
    background: #fff; white-space: nowrap; text-decoration: none;
    color: #333; font-size: 0.9em; font-weight: 700; flex-shrink: 0;
    transition: all 0.2s;
  }
  .ra-chip:hover { border-color: #4caf50; background: #f0faf0; color: #2e7d32; transform: scale(1.05); }
  .ra-chip .ra-icon { font-size: 1.3em; }
  .ra-chip .ra-n { font-size: 0.75em; color: #bbb; }
  .ra-chip.ra-hot { background: #2e7d32; color: #fff; border-color: #2e7d32; }
  .ra-chip.ra-hot .ra-n { color: rgba(255,255,255,0.6); }
  @keyframes ra-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* ========================================= */
  /*  案B: 3D水平回転（大型）                    */
  /* ========================================= */
  .rb-scene { perspective: 1200px; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; overflow: hidden; }
  .rb-ring {
    width: 280px; height: 90px; position: relative;
    transform-style: preserve-3d;
    animation: rb-spin 30s linear infinite;
  }
  .rb-ring:hover { animation-play-state: paused; }
  .rb-cell {
    position: absolute; width: 260px; height: 80px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    border-radius: 14px; background: rgba(255,255,255,0.95);
    border: 1.5px solid #eee; text-decoration: none; color: #333;
    font-size: 0.9em; font-weight: 700; backface-visibility: hidden;
    transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .rb-cell:hover { border-color: #4caf50; color: #2e7d32; box-shadow: 0 4px 16px rgba(76,175,80,0.15); }
  .rb-cell .rb-icon { font-size: 1.6em; }
  .rb-cell .rb-n { font-size: 0.72em; color: #aaa; background: #f0f0f0; padding: 2px 8px; border-radius: 6px; }
  @keyframes rb-spin { from { transform: rotateY(0); } to { transform: rotateY(-360deg); } }

  /* ========================================= */
  /*  案C: 縦回転ドラム（スロット風）             */
  /* ========================================= */
  .rc-row { display: flex; gap: 20px; margin-bottom: 24px; align-items: center; }
  .rc-label-side { font-size: 0.82em; font-weight: 800; color: #999; width: 120px; flex-shrink: 0; }
  .rc-drum-wrap {
    flex: 1; height: 120px; overflow: hidden; position: relative;
    perspective: 600px;
  }
  .rc-drum-wrap::before, .rc-drum-wrap::after {
    content: ''; position: absolute; left: 0; right: 0; height: 35px; z-index: 2;
  }
  .rc-drum-wrap::before { top: 0; background: linear-gradient(180deg, #fff, transparent); }
  .rc-drum-wrap::after { bottom: 0; background: linear-gradient(180deg, transparent, #fff); }
  .rc-drum {
    transform-style: preserve-3d;
    animation: rc-roll 18s linear infinite;
    position: relative; height: 40px;
    margin-top: 40px;
  }
  .rc-drum:hover { animation-play-state: paused; }
  .rc-drum-rev { animation-direction: reverse; animation-duration: 22s; }
  .rc-slot {
    position: absolute; width: 100%; height: 40px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 0.9em; font-weight: 700; color: #333;
    text-decoration: none; backface-visibility: hidden;
  }
  .rc-slot:hover { color: #2e7d32; }
  .rc-slot .rc-icon { font-size: 1.3em; }
  .rc-slot .rc-n { font-size: 0.72em; color: #bbb; }
  @keyframes rc-roll { from { transform: rotateX(0); } to { transform: rotateX(-360deg); } }

  /* ========================================= */
  /*  案D: 円形配置（ぐるぐる回る円）             */
  /* ========================================= */
  .rd-scene { position: relative; width: 450px; height: 450px; margin: 0 auto 24px; }
  .rd-orbit {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    animation: rd-orbit 35s linear infinite;
  }
  .rd-orbit:hover { animation-play-state: paused; }
  .rd-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 1em; font-weight: 900; color: #1b5e20; text-align: center;
    z-index: 5;
  }
  .rd-center span { display: block; font-size: 0.7em; color: #999; font-weight: 500; }
  .rd-item {
    position: absolute; display: flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 12px; background: #fff;
    border: 1.5px solid #eee; text-decoration: none; color: #333;
    font-size: 0.82em; font-weight: 700; white-space: nowrap;
    transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    /* counter-rotate to keep text upright */
    animation: rd-counter 35s linear infinite;
  }
  .rd-item:hover { border-color: #4caf50; color: #2e7d32; transform: scale(1.1); z-index: 10; }
  .rd-item .rd-icon { font-size: 1.3em; }
  .rd-item .rd-n { font-size: 0.7em; color: #bbb; }
  @keyframes rd-orbit { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  @keyframes rd-counter { from { transform: rotate(0); } to { transform: rotate(-360deg); } }
</style>
</head>
<body>

<h1>回転フィルター UI案</h1>
<p class="desc">フィルターチップがクルクル回転する4パターン</p>

<!-- 案A -->
<div class="proposal">
  <div class="proposal-label">案A : 無限横スクロールベルト（左右逆回転 + フェード端）</div>
  <div class="proposal-body">
    <div class="section-label">AI職種から探す</div>
    <div class="ra-wrap">
      <div class="ra-track" id="raTrack1"></div>
    </div>
    <div class="section-label">尖った特徴から探す</div>
    <div class="ra-wrap">
      <div class="ra-track ra-rev" id="raTrack2"></div>
    </div>
    <div class="section-label">AI領域から探す</div>
    <div class="ra-wrap">
      <div class="ra-track" id="raTrack3" style="animation-duration:28s"></div>
    </div>
    <div class="section-label">人気のAIキーワード</div>
    <div class="ra-wrap">
      <div class="ra-track ra-rev" id="raTrack4" style="animation-duration:32s"></div>
    </div>
  </div>
</div>

<!-- 案B -->
<div class="proposal">
  <div class="proposal-label">案B : 3D水平回転リング</div>
  <div class="proposal-body">
    <div class="section-label">AI職種から探す</div>
    <div class="rb-scene"><div class="rb-ring" id="rbRing1"></div></div>
    <div class="section-label">尖った特徴から探す</div>
    <div class="rb-scene"><div class="rb-ring" id="rbRing2" style="animation-duration:35s; animation-direction:reverse"></div></div>
    <div class="section-label">AI領域から探す</div>
    <div class="rb-scene"><div class="rb-ring" id="rbRing3" style="animation-duration:28s"></div></div>
    <div class="section-label">人気のAIキーワード</div>
    <div class="rb-scene"><div class="rb-ring" id="rbRing4" style="animation-duration:32s; animation-direction:reverse"></div></div>
  </div>
</div>

<!-- 案C -->
<div class="proposal">
  <div class="proposal-label">案C : 縦回転ドラム（スロットマシン風・4列並列）</div>
  <div class="proposal-body">
    <div class="rc-row">
      <div class="rc-label-side">AI職種</div>
      <div class="rc-drum-wrap"><div class="rc-drum" id="rcDrum1"></div></div>
      <div class="rc-label-side">尖った特徴</div>
      <div class="rc-drum-wrap"><div class="rc-drum rc-drum-rev" id="rcDrum2"></div></div>
    </div>
    <div class="rc-row">
      <div class="rc-label-side">AI領域</div>
      <div class="rc-drum-wrap"><div class="rc-drum" id="rcDrum3" style="animation-duration:15s"></div></div>
      <div class="rc-label-side">キーワード</div>
      <div class="rc-drum-wrap"><div class="rc-drum rc-drum-rev" id="rcDrum4" style="animation-duration:20s"></div></div>
    </div>
  </div>
</div>

<!-- 案D -->
<div class="proposal">
  <div class="proposal-label">案D : 円形軌道（惑星回転型）</div>
  <div class="proposal-body">
    <div class="rd-scene">
      <div class="rd-center">AImeシップ<span>を探す</span></div>
      <div class="rd-orbit" id="rdOrbit1"></div>
    </div>
  </div>
</div>

<script>
var jobs = [
  {icon:'💬',name:'LLMアプリ開発',n:'56'},{icon:'🧠',name:'プロンプトエンジニア',n:'42'},
  {icon:'🔬',name:'MLエンジニア',n:'38'},{icon:'💻',name:'データサイエンティスト',n:'31'},
  {icon:'📊',name:'AI PMM / BizDev',n:'27'},{icon:'🤖',name:'AIリサーチャー',n:'24'},
  {icon:'⚡',name:'AIエージェント開発',n:'19'},{icon:'🎨',name:'AI x クリエイティブ',n:'15'}
];
var features = [
  {icon:'🏠',name:'フルリモート可',n:'89'},{icon:'🌱',name:'未経験OK',n:'67'},
  {icon:'💰',name:'時給2,000円以上',n:'52'},{icon:'📝',name:'文系歓迎',n:'45'},
  {icon:'👔',name:'CEO / CTO直下',n:'38'},{icon:'📖',name:'論文読み会あり',n:'34'},
  {icon:'🖥️',name:'GPU使い放題',n:'23'},{icon:'🏆',name:'Kaggle推奨',n:'21'},
  {icon:'📄',name:'論文共著チャンス',n:'15'},{icon:'🚀',name:'自社LLM開発中',n:'12'},
  {icon:'🌐',name:'国際学会発表',n:'11'},{icon:'📈',name:'ストックオプション',n:'8'}
];
var areas = [
  {icon:'🧠',name:'LLM / 大規模言語モデル',n:'78'},{icon:'☁️',name:'AI SaaS',n:'56'},
  {icon:'🤖',name:'AIエージェント',n:'34'},{icon:'🎨',name:'画像生成',n:'23'},
  {icon:'📚',name:'AI x 教育',n:'21'},{icon:'🏥',name:'ヘルスケアAI',n:'18'},
  {icon:'💹',name:'AI x 金融',n:'14'},{icon:'🎤',name:'音声AI / TTS',n:'12'},
  {icon:'🦾',name:'ロボティクス',n:'9'},{icon:'🎮',name:'AI x ゲーム',n:'8'}
];
var keywords = [
  {icon:'',name:'RAG'},{icon:'',name:'ファインチューニング'},{icon:'',name:'Claude'},
  {icon:'',name:'LangChain'},{icon:'',name:'Stable Diffusion'},{icon:'',name:'Kaggle'},
  {icon:'',name:'Transformer'},{icon:'',name:'強化学習'}
];

// 案A: 横スクロールベルト
function setupBelt(id, items, hot) {
  var el = document.getElementById(id);
  var html = '';
  for (var r = 0; r < 2; r++) {
    items.forEach(function(d, i) {
      var cls = (hot && i < hot) ? 'ra-chip ra-hot' : 'ra-chip';
      var iconH = d.icon ? '<span class="ra-icon">'+d.icon+'</span>' : '';
      var nH = d.n ? ' <span class="ra-n">'+d.n+'</span>' : '';
      html += '<a class="'+cls+'" href="#">'+iconH+d.name+nH+'</a>';
    });
  }
  el.innerHTML = html;
}
setupBelt('raTrack1', jobs, 1);
setupBelt('raTrack2', features, 2);
setupBelt('raTrack3', areas, 1);
setupBelt('raTrack4', keywords, 0);

// 案B: 3Dリング
function setup3DRing(id, items) {
  var el = document.getElementById(id);
  var n = items.length, angle = 360/n;
  var r = Math.round(135 / Math.tan(Math.PI / n));
  items.forEach(function(d, i) {
    var cell = document.createElement('a');
    cell.className = 'rb-cell'; cell.href = '#';
    var iconH = d.icon ? '<span class="rb-icon">'+d.icon+'</span>' : '';
    var nH = d.n ? '<span class="rb-n">'+d.n+'</span>' : '';
    cell.innerHTML = iconH + d.name + nH;
    cell.style.transform = 'rotateY('+(angle*i)+'deg) translateZ('+r+'px)';
    el.appendChild(cell);
  });
}
setup3DRing('rbRing1', jobs);
setup3DRing('rbRing2', features.slice(0,8));
setup3DRing('rbRing3', areas.slice(0,8));
setup3DRing('rbRing4', keywords);

// 案C: 縦回転ドラム
function setupDrum(id, items) {
  var el = document.getElementById(id);
  var n = items.length, angle = 360/n;
  var r = Math.round(22 / Math.tan(Math.PI / n));
  items.forEach(function(d, i) {
    var slot = document.createElement('a');
    slot.className = 'rc-slot'; slot.href = '#';
    var iconH = d.icon ? '<span class="rc-icon">'+d.icon+'</span>' : '';
    var nH = d.n ? '<span class="rc-n">'+d.n+'</span>' : '';
    slot.innerHTML = iconH + d.name + nH;
    slot.style.transform = 'rotateX('+(angle*i)+'deg) translateZ('+r+'px)';
    el.appendChild(slot);
  });
}
setupDrum('rcDrum1', jobs.slice(0,6));
setupDrum('rcDrum2', features.slice(0,6));
setupDrum('rcDrum3', areas.slice(0,6));
setupDrum('rcDrum4', keywords);

// 案D: 円形軌道
(function() {
  var orbit = document.getElementById('rdOrbit1');
  var allItems = jobs.slice(0,4).concat(features.slice(0,4)).concat(areas.slice(0,4));
  var n = allItems.length;
  var radius = 190;
  allItems.forEach(function(d, i) {
    var item = document.createElement('a');
    item.className = 'rd-item'; item.href = '#';
    var iconH = d.icon ? '<span class="rd-icon">'+d.icon+'</span>' : '';
    var nH = d.n ? '<span class="rd-n">'+d.n+'</span>' : '';
    item.innerHTML = iconH + d.name + nH;
    var angle = (360 / n) * i;
    var rad = angle * Math.PI / 180;
    var x = 225 + radius * Math.cos(rad) - 70;
    var y = 225 + radius * Math.sin(rad) - 20;
    item.style.left = x + 'px';
    item.style.top = y + 'px';
    orbit.appendChild(item);
  });
})();
</script>

</body>
</html>
