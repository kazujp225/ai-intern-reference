<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ヤバい声 横スライド — 1案ずつ表示</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f5f3ed;font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;color:#0a0a0a}
  .nav{position:fixed;top:0;left:0;right:0;background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
  .nav .title{font-size:14px;font-weight:900;letter-spacing:0.05em}
  .nav .label{font-family:"SF Mono",monospace;font-size:12px;color:#10a37f;font-weight:700;letter-spacing:0.1em;min-width:200px;text-align:center}
  .nav .btns{display:flex;gap:8px}
  .nav button{background:#fff;color:#0a0a0a;border:none;border-radius:6px;padding:8px 18px;font-weight:800;font-size:13px;cursor:pointer;transition:background 0.2s}
  .nav button:hover{background:#10a37f;color:#fff}
  .nav button:disabled{opacity:0.3;cursor:default}
  .frame{margin-top:56px;width:100%;height:calc(100vh - 56px);border:none}
</style>
</head>
<body>

<div class="nav">
  <div class="title">ヤバい声 横スライド</div>
  <div>
    <div class="label" id="caseLabel">CASE 01 / 08 — CSSスナップスクロール</div>
  </div>
  <div class="btns">
    <button onclick="go(-1)" id="prevBtn">← 前</button>
    <button onclick="go(1)" id="nextBtn">次 →</button>
  </div>
</div>

<iframe class="frame" id="frame" src="student-voice-slide-variants.html"></iframe>

<script>
const cases = [
  { id: 'case01', name: 'CSSスナップスクロール' },
  { id: 'case02', name: '1枚ずつフル幅' },
  { id: 'case03', name: 'マーキー自動流れ' },
  { id: 'case04', name: 'カードスタック切替' },
  { id: 'case05', name: 'カバーフロー (iTunes風)' },
  { id: 'case06', name: '横スクロール + 大小交互' },
  { id: 'case07', name: '2段マーキー (逆方向)' },
  { id: 'case08', name: 'ピル型タブ + 横スライド' },
];
let cur = 0;

function go(dir) {
  cur = Math.max(0, Math.min(cases.length - 1, cur + dir));
  update();
}

function update() {
  document.getElementById('caseLabel').textContent =
    `CASE ${String(cur+1).padStart(2,'0')} / ${String(cases.length).padStart(2,'0')} — ${cases[cur].name}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === cases.length - 1;

  // variants内の各sectionにスクロール
  const frame = document.getElementById('frame');
  const sections = frame.contentDocument.querySelectorAll('section');
  if (sections[cur]) {
    sections[cur].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

document.getElementById('frame').addEventListener('load', () => {
  // 最初のheaderを非表示
  const h = document.getElementById('frame').contentDocument.querySelector('header');
  if (h) h.style.display = 'none';
  update();
});
</script>

</body></html>
