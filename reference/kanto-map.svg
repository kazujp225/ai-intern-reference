  <!-- ==========================================
       TOOLTIP
  ========================================== -->
  <g id="tooltip" visibility="hidden">
    <rect id="tip-bg" x="0" y="0" width="160" height="52" rx="8" fill="#1b5e20" opacity="0.95"/>
    <text id="tip-name" x="80" y="22" text-anchor="middle" fill="#fff"
          font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif"
          font-size="14" font-weight="700"></text>
    <text id="tip-count" x="80" y="42" text-anchor="middle" fill="#a5d6a7"
          font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif"
          font-size="12" font-weight="600"></text>
  </g>

  <script type="text/javascript"><![CDATA[
    (function () {
      var svg      = document.currentScript ? document.currentScript.closest('svg') : document.querySelector('svg');
      var tooltip  = svg.getElementById('tooltip');
      var tipBg    = svg.getElementById('tip-bg');
      var tipName  = svg.getElementById('tip-name');
      var tipCount = svg.getElementById('tip-count');

      function getSVGPoint(evt) {
        var pt  = svg.createSVGPoint();
        pt.x = evt.clientX; pt.y = evt.clientY;
        var ctm = svg.getScreenCTM();
        if (ctm) pt = pt.matrixTransform(ctm.inverse());
        return pt;
      }

      function positionTooltip(evt, w) {
        var pt = getSVGPoint(evt);
        var tx = Math.max(4, Math.min(pt.x - w / 2, 600 - w - 4));
        var ty = pt.y - 62;
        if (ty < 4) ty = pt.y + 16;
        tooltip.setAttribute('transform', 'translate(' + tx + ',' + ty + ')');
      }

      svg.querySelectorAll('.pref').forEach(function (path) {
        var name  = path.getAttribute('data-pref') || '';
        var count = path.getAttribute('data-count') || '0';

        path.addEventListener('mouseenter', function (evt) {
          tipName.textContent  = name;
          tipCount.textContent = count + '件のインターン';
          var w = Math.max(tipName.getBBox().width, tipCount.getBBox().width) + 36;
          tipBg.setAttribute('width', w);
          tipName.setAttribute('x', w / 2);
          tipCount.setAttribute('x', w / 2);
          tooltip.setAttribute('visibility', 'visible');
          positionTooltip(evt, w);
        });
        path.addEventListener('mousemove', function (evt) {
          positionTooltip(evt, parseFloat(tipBg.getAttribute('width')));
        });
        path.addEventListener('mouseleave', function () {
          tooltip.setAttribute('visibility', 'hidden');
        });
        path.setAttribute('tabindex', '0');
        path.setAttribute('role', 'button');
        path.setAttribute('aria-label', name + ' ' + count + '件');
      });
    })();
  ]]></script>
</svg>
