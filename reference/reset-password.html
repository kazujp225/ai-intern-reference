<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワードリセット | AIme</title>
<link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/mobile-nav.css?v=17">
  <script src="js/mobile-nav.js?v=17" defer></script>
</head><body>

<header class="site-header"><div class="site-header-inner">
  <a class="site-logo" href="original.html"><img src="images/flat_svg/logo_icon.svg" alt="logo">AIme</a>
</div></header>

<div class="auth-wrap">
  <h1 class="auth-title">パスワードを再設定</h1>

  <div id="step-request">
    <p class="auth-sub">登録済みメールアドレスを入力してください。リセット用リンクをお送りします。</p>
    <form id="req-form">
      <div class="form-field"><label>メールアドレス</label><input type="email" id="rp-email" required></div>
      <button type="submit" class="btn-brutal" style="width:100%;">リセットリンクを送る</button>
    </form>
  </div>

  <div id="step-update" style="display:none;">
    <p class="auth-sub">新しいパスワードを入力してください（8文字以上）。</p>
    <form id="upd-form">
      <div class="form-field"><label>新しいパスワード</label><input type="password" id="rp-new" required minlength="8"></div>
      <button type="submit" class="btn-brutal" style="width:100%;">パスワードを更新</button>
    </form>
  </div>

  <div id="rp-msg" style="display:none; padding:10px 14px; border-radius:8px; margin-top:12px; font-weight:700;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/supabase-biz.js"></script>
<script>
(async function(){
  const msg = document.getElementById('rp-msg');
  function show(t, type){ msg.textContent = t; msg.style.display = 'block';
    msg.style.background = type==='error' ? '#ffebee' : '#e8f5e9';
    msg.style.color = type==='error' ? '#c62828' : '#1b5e20'; }

  // password recovery モードで開いていれば更新フォーム
  window.sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      document.getElementById('step-request').style.display = 'none';
      document.getElementById('step-update').style.display = 'block';
    }
  });

  document.getElementById('req-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('rp-email').value.trim();
    const { error } = await window.AImeBiz.sendPasswordReset(email);
    if (error) show('失敗: ' + error.message, 'error');
    else show('✓ メールを送信しました。メール内のリンクから続きの手続きをしてください。', 'success');
  });

  document.getElementById('upd-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('rp-new').value;
    const { error } = await window.AImeBiz.updatePassword(pw);
    if (error) show('失敗: ' + error.message, 'error');
    else { show('✓ パスワードを更新しました。ログインページへ...', 'success'); setTimeout(()=>location.href='login.html', 1500); }
  });
})();
</script>
</body></html>
