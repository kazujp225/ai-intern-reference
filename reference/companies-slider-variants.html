<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>特集AI企業 スライドUI案</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css">
<style>
  body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; background: #f6f7f9; color: #222; }
  h1 { text-align: center; padding: 30px 0 10px; margin: 0; font-size: 1.6em; }
  .variant { max-width: 1100px; margin: 30px auto 60px; background: #fff; padding: 30px 10px 40px; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
  .variant h2 { text-align: center; font-size: 1.2em; margin: 0 0 24px; color: #1b5e20; }
  .variant .note { text-align: center; font-size: .85em; color: #666; margin: -18px 0 20px; }

  /* shared card */
  .c-card { background: #fff; border-radius: 12px; padding: 20px 14px; width: 150px; box-shadow: 0 2px 10px rgba(0,0,0,.06);
            display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; color: inherit; box-sizing: border-box; }
  .c-card .logo { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; }
  .c-card .logo svg, .c-card .logo img { width: 50px; height: 50px; object-fit: contain; }
  .c-card .n { font-size: .95em; font-weight: 700; }
  .c-card .d { font-size: .75em; color: #888; }

  /* A: marquee (2-row) */
  .marquee { overflow: hidden; position: relative; padding: 10px 0; }
  .marquee-track { display: flex; gap: 20px; width: max-content; animation: marquee 40s linear infinite; }
  .marquee-track.reverse { animation-direction: reverse; animation-duration: 50s; margin-top: 18px; }
  .marquee:hover .marquee-track { animation-play-state: paused; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee::before, .marquee::after { content: ''; position: absolute; top: 0; bottom: 0; width: 60px; z-index: 2; pointer-events: none; }
  .marquee::before { left: 0; background: linear-gradient(to right, #fff, transparent); }
  .marquee::after { right: 0; background: linear-gradient(to left, #fff, transparent); }

  /* B: slick */
  .slick-wrap { padding: 0 40px; }
  .slick-wrap .slick-slide { padding: 10px 8px; }
  .slick-wrap .slick-prev:before, .slick-wrap .slick-next:before { color: #1b5e20; }

  /* C: 3D coverflow */
  .cover3d-scene { perspective: 1200px; height: 260px; overflow: hidden; position: relative; }
  .cover3d { position: relative; width: 220px; height: 220px; margin: 20px auto 0; transform-style: preserve-3d;
             animation: spin3d 30s linear infinite; }
  .cover3d .c-card { position: absolute; top: 0; left: 0; }
  @keyframes spin3d { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
  .cover3d-scene:hover .cover3d { animation-play-state: paused; }

  /* D: fade cloud */
  .cloud-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .cloud-slot { position: relative; height: 150px; }
  .cloud-slot .c-card { position: absolute; inset: 0; width: auto; opacity: 0; transition: opacity .6s ease; }
  .cloud-slot .c-card.active { opacity: 1; }

  /* E: shuffle tiles */
  .tile-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .tile-slot { height: 150px; perspective: 800px; }
  .tile-card { position: relative; width: 100%; height: 100%; transition: transform .7s; transform-style: preserve-3d; }
  .tile-card.flipped { transform: rotateY(180deg); }
  .tile-face { position: absolute; inset: 0; backface-visibility: hidden; }
  .tile-face.back { transform: rotateY(180deg); }
  .tile-face .c-card { width: auto; height: 100%; }
</style>
</head>
<body>

<h1>特集：トップAI企業 — スライドUI案 5種</h1>

<!-- A: Marquee -->
<div class="variant">
  <h2>案A: 無限マーキー（2段逆方向）</h2>
  <div class="note">自動で流れ続ける。ホバーで一時停止。軽量でシンプル。</div>
  <div class="marquee">
    <div class="marquee-track" id="mqA1"></div>
    <div class="marquee-track reverse" id="mqA2"></div>
  </div>
</div>

<!-- B: Slick -->
<div class="variant">
  <h2>案B: Slickカルーセル（手動送り+autoplay）</h2>
  <div class="note">矢印/ドット操作。既存Slick資産と統一感。</div>
  <div class="slick-wrap"><div id="slickB"></div></div>
</div>

<!-- C: 3D -->
<div class="variant">
  <h2>案C: 3D回転カルーセル</h2>
  <div class="note">立体的に回転。インパクト大。</div>
  <div class="cover3d-scene"><div class="cover3d" id="cover3d"></div></div>
</div>

<!-- D: Fade cloud -->
<div class="variant">
  <h2>案D: ロゴクラウド（フェード切替）</h2>
  <div class="note">5枠固定。一定間隔でロゴが静かに入れ替わる。</div>
  <div class="cloud-grid" id="cloudGrid"></div>
</div>

<!-- E: Shuffle tiles -->
<div class="variant">
  <h2>案E: タイルシャッフル（フリップ）</h2>
  <div class="note">各セルがランダムにフリップして別ロゴに切り替わる。</div>
  <div class="tile-grid" id="tileGrid"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  {n:'Adobe',d:'Firefly',l:'<svg viewBox="0 0 24 24"><path fill="#FF0000" d="M13.97 22.62l-1.69-4.28H8.12l3.89-9.14 5.66 13.42zM8.88 1.38H0v21.24zm15.12 0h-8.88L24 22.62Z"/></svg>'},
  {n:'Intel',d:'AI半導体',l:'<svg viewBox="0 0 24 24"><path fill="#0071C5" d="M20.42 7.35v9.18h1.65V7.35zM0 7.48v1.74h1.74V7.47zm9.78.35v6.05c0 .51.04.95.13 1.29.09.34.24.62.44.83.2.21.48.36.8.45.33.09.75.14 1.26.14h.22v-1.53c-.24 0-.45-.01-.59-.04a.67.67 0 01-.39-.17.7.7 0 01-.17-.38 4 4 0 01-.04-.6v-2.18h1.2V10.2h-1.2V7.83z"/></svg>'}

// Card builder
function card(c) {
  return `<a href="#" class="c-card"><div class="logo">${c.l}</div><span class="n">${c.n}</span><span class="d">${c.d}</span></a>`;
}

// A: Marquee (duplicate list for seamless loop)
const mqHalf1 = companies.slice(0, 8).map(card).join('');
const mqHalf2 = companies.slice(7).map(card).join('');
document.getElementById('mqA1').innerHTML = mqHalf1 + mqHalf1;
document.getElementById('mqA2').innerHTML = mqHalf2 + mqHalf2;

// B: Slick
document.getElementById('slickB').innerHTML = companies.map(c => `<div>${card(c)}</div>`).join('');
$('#slickB').slick({
  slidesToShow: 5, slidesToScroll: 1, autoplay: true, autoplaySpeed: 2000,
  arrows: true, dots: true,
  responsive: [{ breakpoint: 768, settings: { slidesToShow: 2 } }]
});

// C: 3D
const radius = 320;
const c3d = document.getElementById('cover3d');
companies.forEach((c, i) => {
  const angle = (360 / companies.length) * i;
  const el = document.createElement('div');
  el.style.cssText = `position:absolute; top:0; left:0; transform: rotateY(${angle}deg) translateZ(${radius}px);`;
  el.innerHTML = card(c);
  c3d.appendChild(el);
});

// D: Fade cloud (5 slots, rotating through all companies)
const cloudGrid = document.getElementById('cloudGrid');
const slotCount = 5;
const slots = [];
for (let i = 0; i < slotCount; i++) {
  const s = document.createElement('div');
  s.className = 'cloud-slot';
  cloudGrid.appendChild(s);
  slots.push({ el: s, idx: i, cur: null });
}
function rotateCloud() {
  slots.forEach((s, i) => {
    s.idx = (s.idx + slotCount) % companies.length;
    const newCard = document.createElement('div');
    newCard.innerHTML = card(companies[s.idx]);
    const el = newCard.firstChild;
    s.el.appendChild(el);
    requestAnimationFrame(() => el.classList.add('active'));
    if (s.cur) {
      const old = s.cur;
      old.classList.remove('active');
      setTimeout(() => old.remove(), 600);
    }
    s.cur = el;
    s.idx += slotCount; // advance
  });
}
rotateCloud();
setInterval(rotateCloud, 2200);

// E: Shuffle tiles (flip to random new company)
const tileGrid = document.getElementById('tileGrid');
const initialTiles = companies.slice(0, 5);
const tileStates = [];
initialTiles.forEach((c, i) => {
  const slot = document.createElement('div');
  slot.className = 'tile-slot';
  slot.innerHTML = `<div class="tile-card">
      <div class="tile-face front">${card(c)}</div>
      <div class="tile-face back">${card(c)}</div>
    </div>`;
  tileGrid.appendChild(slot);
  tileStates.push({ slot, cardEl: slot.querySelector('.tile-card'), flipped: false, front: c, back: c });
});
function shuffleTile() {
  const idx = Math.floor(Math.random() * tileStates.length);
  const t = tileStates[idx];
  const next = companies[Math.floor(Math.random() * companies.length)];
  if (t.flipped) {
    t.cardEl.querySelector('.front').innerHTML = card(next);
    t.front = next;
  } else {
    t.cardEl.querySelector('.back').innerHTML = card(next);
    t.back = next;
  }
  t.flipped = !t.flipped;
  t.cardEl.classList.toggle('flipped');
}
setInterval(shuffleTile, 1200);
</script>
