<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><title>案7: 付箋コラージュ</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{margin:0;background:#f4ecd8;background-image:radial-gradient(#d4c896 1px,transparent 1px);background-size:20px 20px;font-family:"Klee","Yu Mincho","Hiragino Maru Gothic ProN",sans-serif;padding:60px 20px;color:#222}
  .wrap{max-width:1100px;margin:0 auto}
  h2{text-align:center;font-size:32px;margin:0 0 8px;color:#3a2a1a}
  .sub{text-align:center;color:#7a6a5a;font-size:14px;margin:0 0 48px}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
  @media(max-width:900px){.board{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.board{grid-template-columns:1fr}}
  .note{padding:24px 22px 20px;font-size:15px;line-height:1.8;box-shadow:2px 4px 12px rgba(0,0,0,0.18),inset 0 0 40px rgba(0,0,0,0.04);position:relative;transition:.3s}
  .note:hover{transform:scale(1.04) rotate(0deg)!important;z-index:10;box-shadow:4px 8px 24px rgba(0,0,0,0.3)}
  .note::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:60px;height:18px;background:rgba(200,180,140,0.6);border:1px solid rgba(0,0,0,0.1)}
  .note .text{margin:0 0 14px}
  .note .author{font-size:12px;text-align:right;color:#5a4a3a}
  .note:nth-child(1){background:#fff59d;transform:rotate(-2deg)}
  .note:nth-child(2){background:#ffab91;transform:rotate(1.5deg)}
  .note:nth-child(3){background:#a5d6a7;transform:rotate(-1deg)}
  .note:nth-child(4){background:#90caf9;transform:rotate(2deg)}
  .note:nth-child(5){background:#ce93d8;transform:rotate(-1.5deg)}
  .note:nth-child(6){background:#ffe082;transform:rotate(1deg)}
</style></head><body>
<div class="wrap">
  <h2>AI名言集</h2><p class="sub">先駆者たちのコトバ・コラージュ</p>
  <div class="board">
    <div class="note"><p class="text">AIは最後の発明になるだろう。その後の発明はすべてAIがやるからだ。</p><p class="author">— I.J. Good</p></div>
    <div class="note"><p class="text">AIを恐れるな。AIを使いこなせない自分を恐れろ。</p><p class="author">— サム・アルトマン</p></div>
    <div class="note"><p class="text">機械が考えられるかを問うのは、潜水艦が泳げるかを問うようなものだ。</p><p class="author">— ダイクストラ</p></div>
    <div class="note"><p class="text">AIは電気と同じくらい、すべての産業を変革する。</p><p class="author">— アンドリュー・ン</p></div>
    <div class="note"><p class="text">未来を予測する最良の方法は、それを発明することだ。</p><p class="author">— アラン・ケイ</p></div>
    <div class="note"><p class="text">プロンプトは新しいプログラミング言語だ。誰でも書ける、最も民主的なコードだ。</p><p class="author">— カルパシー</p></div>
  </div>
</div></body></html>
