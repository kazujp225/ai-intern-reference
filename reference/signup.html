<div class="auth-wrap">
  <h1 class="auth-title">無料で新規登録</h1>
  <p class="auth-sub">30秒でスタート。AI特化インターン情報があなたに届きます。</p>

  <form id="signup-form">
    <div class="form-field">
      <label>メールアドレス</label>
      <input type="email" id="signup-email" required placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-field">
      <label>パスワード（8文字以上）</label>
      <input type="password" id="signup-password" required minlength="8" autocomplete="new-password">
    </div>
    <div class="form-field">
      <label>ニックネーム</label>
      <input type="text" id="signup-nickname" required placeholder="例: taro">
    </div>
    <div class="form-field">
      <label>大学・学部（任意）</label>
      <input type="text" id="signup-school" placeholder="例: ○○大学 情報学部">
    </div>

    <label class="form-check">
      <input type="checkbox" required>
      <span><a href="#">利用規約</a>・<a href="#">プライバシーポリシー</a>に同意する</span>
    </label>

    <div id="signup-message" class="auth-message" role="alert" style="display:none; margin: 10px 0 0; padding: 10px 14px; border-radius: 8px; font-size: .9em; font-weight: 700;"></div>

    <button type="submit" id="signup-submit" class="btn-brutal" style="width: 100%; margin-top: 12px;">
      <span class="tag">無料</span>新規登録する
    </button>
  </form>

  <div class="form-divider">または</div>

  <div style="display:grid; gap:8px;">
    <button type="button" class="social-btn" data-oauth="google" style="background:#fff; color:#222; border:1px solid #e0e0e0; cursor:pointer; padding:12px; display:flex; align-items:center; justify-content:center; gap:10px; border-radius:8px; font-weight:800;">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google で登録
    </button>
    <button type="button" class="social-btn" data-oauth="linkedin_oidc" style="background:#0a66c2; color:#fff; border:none; cursor:pointer; padding:12px; display:flex; align-items:center; justify-content:center; gap:10px; border-radius:8px; font-weight:800;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn で登録
    </button>
    <button type="button" class="social-btn" data-oauth="github" style="background:#24292f; color:#fff; border:none; cursor:pointer; padding:12px; display:flex; align-items:center; justify-content:center; gap:10px; border-radius:8px; font-weight:800;">

      GitHub で登録
    </button>
  </div>

    企業の方は <a href="company-signup.html">企業登録</a> / 既にアカウントをお持ちですか？ <a href="login.html">ログイン</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/supabase-biz.js"></script>
<script src="js/supabase-v3.js"></script>
<script>
(function () {
  document.querySelectorAll('[data-oauth]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try { await window.AImeV3.signInWithOAuth(btn.dataset.oauth); }
      catch (err) { alert('登録失敗: ' + err.message); }
    });
  });

  const form = document.getElementById('signup-form');
  const emailEl = document.getElementById('signup-email');
  const passEl = document.getElementById('signup-password');
  const nickEl = document.getElementById('signup-nickname');
  const schoolEl = document.getElementById('signup-school');
  const btn = document.getElementById('signup-submit');
  const msg = document.getElementById('signup-message');

  function showMessage(text, type) {
    msg.innerHTML = text;
    msg.style.display = 'block';
    if (type === 'error') {
      msg.style.background = '#ffebee';
      msg.style.color = '#c62828';
      msg.style.border = '1px solid #ef9a9a';
    } else {
      msg.style.background = '#e8f5e9';
      msg.style.color = '#1b5e20';
      msg.style.border = '1px solid #a5d6a7';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!window.sb) { showMessage('Supabase クライアントが初期化されていません', 'error'); return; }

    btn.disabled = true;
    const originalHTML = btn.innerHTML;
    btn.textContent = '登録中...';
    msg.style.display = 'none';

    const { data, error } = await window.sb.auth.signUp({
      email: emailEl.value.trim(),
      password: passEl.value,
      options: {
        data: {
          nickname: nickEl.value.trim(),
          school: schoolEl.value.trim() || null,
        },
        emailRedirectTo: location.origin + '/login.html',
      },
    });

    if (error) {
      showMessage('登録に失敗しました: ' + error.message, 'error');
      btn.disabled = false;
      btn.innerHTML = originalHTML;
      return;
    }

    if (data?.user && !data.session) {
      showMessage('登録メールを送信しました。<br>メール内のリンクから認証を完了してください。', 'success');
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    } else {
      showMessage('登録が完了しました。トップページへ移動します...', 'success');
      setTimeout(() => { location.href = 'original.html'; }, 1000);
    }
  });
})();
</script>
