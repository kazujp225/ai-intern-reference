<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | AIme</title>
<link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/mobile-nav.css">
  <script src="js/mobile-nav.js" defer></script>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="original.html"><img src="images/flat_svg/logo_icon.svg" alt="logo">AIme</a>
    <nav class="site-nav">
      <a href="search.html">インターンを探す</a>
      <a href="companies.html">AI企業を探す</a>
      <a href="blog.html">AIコラム</a>
      <a href="login.html" class="login current">ログイン</a>
      <a href="signup.html" class="register">新規登録</a>
    </nav>
  </div>
</header>

<nav class="breadcrumb">
  <a href="original.html">トップ</a><span>/</span>ログイン
</nav>

<div class="auth-wrap">
  <h1 class="auth-title">ログイン</h1>
  <p class="auth-sub">おかえりなさい。続きからスタート。</p>

  <form id="login-form">
    <div class="form-field">
      <label>メールアドレス</label>
      <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-field">
      <label>パスワード</label>
      <input type="password" id="login-password" required autocomplete="current-password">
    </div>

    <label class="form-check">
      <input type="checkbox"><span>ログイン状態を保持する</span>
    </label>

    <div id="login-message" class="auth-message" role="alert" style="display:none; margin: 10px 0 0; padding: 10px 14px; border-radius: 8px; font-size: .9em; font-weight: 700;"></div>

    <button type="submit" id="login-submit" class="btn-brutal" style="width: 100%; margin-top: 12px;">ログインする</button>
  </form>

  <div style="text-align:right; margin-top: 12px; font-size: .85em;">
    <a href="reset-password.html">パスワードをお忘れですか？</a>
  </div>

  <div style="margin-top:16px; padding-top:16px; border-top:1px solid #eee;">
    <div style="font-size:.82em; color:#666; font-weight:700; margin-bottom:6px;">✉️ Magic Link でログイン（パスワードなし）</div>
    <div style="display:flex; gap:6px;">
      <input id="magic-email" type="email" placeholder="you@example.com" style="flex:1; padding:10px 12px; border:1px solid #e0e0e0; border-radius:8px; font-size:.9em;">
      <button id="magic-send" type="button" style="padding:10px 16px; background:#2e7d32; color:#fff; border:none; border-radius:8px; font-weight:800; cursor:pointer;">送信</button>
    </div>
    <div id="magic-msg" style="font-size:.78em; margin-top:6px; display:none;"></div>
  </div>

  <div class="auth-foot">
    初めてのご利用ですか？ <a href="signup-role.html">新規登録</a>
  </div>

</div>

<footer class="site-footer">
  <div class="site-footer-inner">
    <div>
      <div class="brand">AIme</div>
      <p style="font-size:.85em; margin:0;">AI特化インターン求人サイト。</p>
    </div>
    <div>
      <h4>検索</h4>
      <ul>
        <li><a href="search.html">求人を探す</a></li>
        <li><a href="companies.html">企業一覧</a></li>
      </ul>
    </div>
    <div>
      <h4>アカウント</h4>
      <ul>
        <li><a href="login.html">ログイン</a></li>
        <li><a href="signup.html">新規登録</a></li>
      </ul>
    </div>
    <div>
      <h4>サービス</h4>
      <ul>
        <li><a href="#">採用担当者様へ</a></li>
        <li><a href="#">お問合せ</a></li>
      </ul>
    </div>
  </div>
  <div class="copyright">© 2026 AIme. All rights reserved.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/supabase-biz.js"></script>
<script src="js/supabase-v3.js"></script>
<script>
(function () {
  // Magic Link
  document.getElementById('magic-send')?.addEventListener('click', async () => {
    const email = document.getElementById('magic-email').value.trim();
    const msg = document.getElementById('magic-msg');
    if (!email) { msg.textContent = 'メールアドレスを入力してください'; msg.style.color = '#c62828'; msg.style.display = 'block'; return; }
    try {
      await window.AImeV3.signInWithMagicLink(email);
      msg.textContent = '✓ ログイン用リンクを送信しました。メールをご確認ください。';
      msg.style.color = '#1b5e20'; msg.style.display = 'block';
    } catch (err) {
      msg.textContent = 'エラー: ' + err.message;
      msg.style.color = '#c62828'; msg.style.display = 'block';
    }
  });

  const form = document.getElementById('login-form');
  const emailEl = document.getElementById('login-email');
  const passEl = document.getElementById('login-password');
  const btn = document.getElementById('login-submit');
  const msg = document.getElementById('login-message');

  function showMessage(text, type) {
    msg.textContent = text;
    msg.style.display = 'block';
    if (type === 'error') {
      msg.style.background = '#ffebee';
      msg.style.color = '#c62828';
      msg.style.border = '1px solid #ef9a9a';
    } else {
      msg.style.background = '#e8f5e9';
      msg.style.color = '#1b5e20';
      msg.style.border = '1px solid #a5d6a7';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!window.sb) { showMessage('Supabase クライアントが初期化されていません', 'error'); return; }

    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'ログイン中...';
    msg.style.display = 'none';

    const { data, error } = await window.sb.auth.signInWithPassword({
      email: emailEl.value.trim(),
      password: passEl.value,
    });

    if (error) {
      showMessage('ログインに失敗しました: ' + error.message, 'error');
      btn.disabled = false;
      btn.textContent = originalText;
      return;
    }

    showMessage('ログインしました。トップページへ移動します...', 'success');
    setTimeout(() => { location.href = 'original.html'; }, 800);
  });
})();
</script>

</body>
</html>
