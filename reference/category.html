      {co:'株式会社エッジAI', title:'モデル軽量化・量子化の実装。即戦力歓迎で時給も高水準。', tags:['高単価','量子化','即戦力','週3〜'], pay:'2,800〜5,000', loc:'大手町駅 徒歩3分', time:'週3〜'},
      {co:'株式会社GPUスタジオ', title:'大規模モデル学習の実装。GPU環境込みで高待遇。', tags:['高単価','H100','大規模学習','論文共著'], pay:'3,000〜6,500', loc:'渋谷駅 徒歩6分', time:'週3〜'},
      {co:'合同会社AGIラボ', title:'AGI研究の最前線。少数精鋭で時給は上限を気にしない。', tags:['高単価','AGI研究','少数精鋭'], pay:'3,000〜7,000', loc:'本郷三丁目駅 徒歩5分', time:'週3〜'},
    ]
  },
};

// パラメータ取得
const params = new URLSearchParams(location.search);
const cat = params.get('cat') || 'プロンプトエンジニア';
const genericJobs = [
  {band:'Pickup', co:'株式会社ニューロンクラフト', title:'【'+cat+'】に関連するインターンで、実務経験をガッツリ積もう。', tags:[cat,'週3〜','リモート可'], pay:'2,000〜4,000', loc:'渋谷駅 徒歩5分', time:'週3〜'},
  {co:'合同会社AIワークス', title:'【'+cat+'】領域の最前線で、若手のうちから裁量大きく動けるポジション。', tags:[cat,'裁量大','若手活躍'], pay:'2,200〜4,500', loc:'ハイブリッド', time:'週2〜'},
  {co:'株式会社ネクストAI', title:'【'+cat+'】の企画〜実装まで、フルスタックに関われるスタートアップ。', tags:[cat,'フルスタック','シリーズA'], pay:'2,500〜5,000', loc:'フルリモート', time:'週2〜'},
  {co:'AIパイオニアズ株式会社', title:'【'+cat+'】のプロジェクトに、エンジニア3名の少数精鋭で取り組む。', tags:[cat,'少数精鋭','CTO直下'], pay:'2,800〜5,500', loc:'本郷三丁目駅 徒歩5分', time:'週3〜'},
];
const catData = CATEGORIES[cat] || { count: Math.floor(Math.random()*50)+10, desc: cat + ' に関連するAIインターン求人を一覧表示しています。', jobs: genericJobs };

document.getElementById('crumb-cat').textContent = cat;
document.getElementById('cat-title').textContent = cat;
document.getElementById('cat-desc').textContent = catData.desc;
document.getElementById('cat-count').textContent = catData.count + '件';
document.title = cat + ' のインターンシップ | AIme';

function renderList(){
  const sort = document.getElementById('sort').value;
  const loc = document.getElementById('loc').value;
  const kw = document.getElementById('kw').value.trim().toLowerCase();

  let rows = catData.jobs.slice();
  if (loc) rows = rows.filter(r => r.loc.includes(loc) || (loc==='リモート' && r.loc.includes('リモート')));
  if (kw) rows = rows.filter(r => (r.title+r.co+r.tags.join('')).toLowerCase().includes(kw));
  if (sort === 'payHigh' || sort === 'payLow') {
    const dir = sort === 'payHigh' ? -1 : 1;
    rows.sort((a,b) => {
      const aMax = parseInt(a.pay.split('〜')[1] || a.pay);
      const bMax = parseInt(b.pay.split('〜')[1] || b.pay);
      return (aMax - bMax) * dir;
    });
  }

  const listEl = document.getElementById('list');
  document.getElementById('result-count').textContent = rows.length + '件表示中';
  if (rows.length === 0) {
    listEl.innerHTML = '<div class="empty">条件に合う求人が見つかりませんでした。</div>';
    return;
  }
  listEl.innerHTML = rows.map(r => `
    <a href="#" class="job">
      <div>
        ${r.band ? `<span class="band">${r.band}</span><br>` : ''}
        <div class="company">${r.co}</div>
        <h3>${r.title}</h3>
        <div class="tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="meta"><span>${r.loc}</span><span>${r.time}</span></div>
      </div>
      <div class="pay">¥${r.pay}<span class="pay-unit">時給</span></div>
    </a>
  `).join('');
}

document.getElementById('sort').addEventListener('change', renderList);
document.getElementById('loc').addEventListener('change', renderList);
document.getElementById('kw').addEventListener('input', renderList);
renderList();

// 関連カテゴリ
const related = Object.keys(CATEGORIES).filter(k => k !== cat).slice(0, 8);
document.getElementById('related-chips').innerHTML = related.map(k =>
  `<a class="chip" href="category.html?cat=${encodeURIComponent(k)}">${k} (${CATEGORIES[k].count})</a>`
).join('');
</script>
</body>
</html>
